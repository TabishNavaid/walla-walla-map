<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    ============================================================
    Downtown Walla Walla — Commercial Vacancy Map (Prototype)
    ============================================================
    Project:  Interactive Map of Downtown Walla Walla
    Sponsor:  Prof. Wisnu Sugiarto, Economics Dept., Whitman College
    Client:   Downtown Walla Walla Foundation (downtownww.com)

    Developer notes:
    ----------------
    This is a front-end prototype built to demonstrate the core
    concept for the Economic Vitality Committee's website project.
    All building data below is SAMPLE / PLACEHOLDER, in a real
    deployment this would be fetched from a database or a managed
    spreadsheet (e.g. Google Sheets API, Airtable, or a simple
    backend like Supabase).

    Tech stack:
    -----------
    - Leaflet.js v1.9.4  → open-source mapping library (no API key needed)
    - OpenStreetMap tiles → free map tiles, attribution required
    - Vanilla JS / HTML / CSS → no build tools, runs in any browser

    Known limitations of this prototype:
    -------------------------------------
    1. Building data is hardcoded — needs a real DB or CMS backend
    2. No admin interface for the Foundation to update listings
    3. No authentication — everything is public read-only for now
    4. Marker positions are approximate (manually set lat/lng)
       — real version should geocode from actual street addresses

    Next steps (for full project scope):
    -------------------------------------
    - Connect to a live data source (Airtable or Google Sheets)
    - Add an admin panel so Foundation staff can add/edit listings
    - Embed as an iframe on downtownww.com
    - Add photo uploads per listing
    - Add sq ft range slider filter

    Last updated: June 2026
    ============================================================
  -->

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Downtown Walla Walla — Vacancy Map</title>

  <!-- Leaflet CSS: styles for the map container and default controls -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    /* =============================================================
       BASE RESET & LAYOUT
       We use a flex column layout so the topbar stays fixed at the
       top and the map+panel fill the remaining viewport height.
    ============================================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html, body {
      height: 100%;
      background: #ffffff;
    }

    /* Main app wrapper: column flex so topbar + main stack vertically */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-height: 600px;
    }

    /* =============================================================
       TOP BAR: title, filters, and live vacancy stats
    ============================================================= */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      background: #ffffff;
      border-bottom: 1px solid #e5e5e5;
      gap: 14px;
      flex-wrap: wrap;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
      z-index: 1000; /* sit above the map */
    }

    #topbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #111;
    }

    #topbar .subtitle {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    /* =============================================================
       FILTER CONTROLS
       Three dropdowns: status, type, max rent.
       All filters are applied together on any change.
    ============================================================= */
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .filter-group label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
    }

    .filter-group select {
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: #f7f7f7;
      color: #111;
      height: 30px;
      cursor: pointer;
    }

    .filter-group select:hover {
      border-color: #aaa;
    }

    /* =============================================================
       STAT PILLS
       Show live counts of vacant / partial / occupied spaces,
       updating whenever filters change.
    ============================================================= */
    #stats {
      display: flex;
      gap: 6px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      padding: 4px 11px;
      border-radius: 20px;
      font-weight: 500;
    }

    /* Color-coded by status — same palette as the map markers */
    .stat-vacant   { background: #FAECE7; color: #993C1D; }
    .stat-partial  { background: #FAEEDA; color: #854F0B; }
    .stat-occupied { background: #EAF3DE; color: #3B6D11; }

    .stat .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* =============================================================
       MAIN CONTENT AREA
       Left side: Leaflet map (flex: 1, fills remaining space)
       Right side: sidebar panel (fixed 280px width)
    ============================================================= */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden; /* prevents the map from causing page scroll */
    }

    /* The Leaflet map fills all remaining horizontal space */
    #map {
      flex: 1;
      height: 100%;
    }

    /* =============================================================
       SIDEBAR PANEL
       Shows either:
         (a) a scrollable list of available spaces, or
         (b) a detail view for a selected building
       These two states are toggled via CSS classes.
    ============================================================= */
    #panel {
      width: 285px;
      background: #ffffff;
      border-left: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #panel-header {
      padding: 12px 14px;
      border-bottom: 1px solid #e5e5e5;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      background: #fafafa;
    }

    /* --- Listing view (default state) --- */
    #listing {
      flex: 1;
      overflow-y: auto;
    }

    /* Each building row in the sidebar list */
    .list-item {
      padding: 12px 14px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.12s;
    }

    .list-item:hover   { background: #f7f7f7; }
    .list-item.active  { background: #eef4ff; border-left: 3px solid #3b82f6; }

    .list-item h3 {
      font-size: 13px;
      font-weight: 600;
      color: #111;
      margin-bottom: 5px;
    }

    .list-item .meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .list-item .sub-detail {
      font-size: 11px;
      color: #777;
      margin-top: 4px;
    }

    /* Empty state when filters return zero results */
    #empty {
      display: none;
      padding: 28px 14px;
      text-align: center;
      color: #999;
      font-size: 13px;
    }

    /* --- Status badge pill used in list and detail views --- */
    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .badge-vacant   { background: #FAECE7; color: #993C1D; }
    .badge-occupied { background: #EAF3DE; color: #3B6D11; }
    .badge-partial  { background: #FAEEDA; color: #854F0B; }

    /* --- Detail view (shown when a building is selected) --- */
    #detail-panel {
      display: none; /* hidden by default; shown via .open class */
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    #detail-panel.open {
      display: flex;
    }

    /* When detail is open, hide the list */
    #listing.hidden { display: none; }

    /* Back button at top of detail view */
    #detail-back {
      padding: 10px 14px;
      font-size: 12px;
      color: #555;
      cursor: pointer;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #fafafa;
    }

    #detail-back:hover { background: #f0f0f0; }

    #detail-content {
      padding: 16px 14px;
      flex: 1;
      overflow-y: auto;
    }

    .detail-address {
      font-size: 16px;
      font-weight: 700;
      color: #111;
      margin-bottom: 8px;
    }

    /* Section headers inside the detail card */
    .detail-section { margin-top: 16px; }

    .detail-section h4 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #aaa;
      margin-bottom: 8px;
      font-weight: 600;
    }

    /* Key-value row inside detail sections */
    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .detail-row span:first-child { color: #888; }
    .detail-row span:last-child  { font-weight: 600; color: #111; }

    /* Notes / description block */
    .notes-box {
      background: #f7f7f7;
      border-radius: 7px;
      padding: 10px 12px;
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      line-height: 1.65;
    }

    /* =============================================================
       LEAFLET POPUP OVERRIDES
       Custom styling for the map popup that appears when clicking a
       marker. Leaflet's default styles are overridden here.
    ============================================================= */
    .leaflet-popup-content-wrapper {
      border-radius: 10px !important;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15) !important;
      padding: 0 !important;
    }

    .leaflet-popup-content {
      margin: 0 !important;
      padding: 0 !important;
      min-width: 190px;
    }

    .popup-inner    { padding: 12px 14px; }
    .popup-addr     { font-size: 13px; font-weight: 700; color: #111; margin-bottom: 5px; }
    .popup-type     { font-size: 11px; color: #777; margin-top: 4px; }
    .popup-rent     { font-size: 13px; font-weight: 700; color: #1a56db; margin-top: 6px; }
    .popup-hint     { font-size: 10px; color: #aaa; margin-top: 6px; font-style: italic; }
  </style>
</head>
<body>

<div id="app">

  <!-- ============================================================
       TOP BAR
       Contains: app title, filter controls, and live stat pills
  ============================================================= -->
  <div id="topbar">

    <!-- App title and project context -->
    <div>
      <h1>Downtown Walla Walla — Vacancy Map</h1>
      <div class="subtitle">Downtown Walla Walla Foundation &nbsp;·&nbsp; Prototype / Sample Data</div>
    </div>

    <!-- Filter controls — all three are read together in applyFilters() -->
    <div class="filters">
      <div class="filter-group">
        <label>Status</label>
        <select id="f-status">
          <option value="all">All statuses</option>
          <option value="Vacant">Vacant</option>
          <option value="Partial">Partial vacancy</option>
          <option value="Occupied">Occupied</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Space type</label>
        <select id="f-type">
          <option value="all">All types</option>
          <option value="Retail">Retail</option>
          <option value="Office">Office</option>
          <option value="Mixed-use">Mixed-use</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Max rent / mo</label>
        <select id="f-rent">
          <option value="0">Any price</option>
          <option value="1000">Under $1,000</option>
          <option value="1500">Under $1,500</option>
          <option value="2000">Under $2,000</option>
          <option value="3000">Under $3,000</option>
        </select>
      </div>
    </div>

    <!-- Live stat pills — counts update when filters are applied -->
    <div id="stats">
      <div class="stat stat-vacant">
        <div class="dot" style="background:#D85A30;"></div>
        <span id="cnt-v">0</span>&nbsp;vacant
      </div>
      <div class="stat stat-partial">
        <div class="dot" style="background:#EF9F27;"></div>
        <span id="cnt-p">0</span>&nbsp;partial
      </div>
      <div class="stat stat-occupied">
        <div class="dot" style="background:#639922;"></div>
        <span id="cnt-o">0</span>&nbsp;occupied
      </div>
    </div>

  </div><!-- /#topbar -->

  <!-- ============================================================
       MAIN CONTENT: MAP + SIDEBAR PANEL
  ============================================================= -->
  <div id="main">

    <!-- Leaflet map renders here. Initialized in JS below. -->
    <div id="map"></div>

    <!-- =========================================================
         SIDEBAR PANEL
         Two child sections that swap visibility:
           #listing     → default scrollable list of spaces
           #detail-panel → shown when a building is selected
    ========================================================== -->
    <div id="panel">

      <div id="panel-header">Available spaces</div>

      <!-- Scrollable list of non-occupied buildings -->
      <div id="listing"></div>

      <!-- Shown when filters return no results -->
      <div id="empty">No spaces match your current filters.</div>

      <!-- Detail view: hidden until a building is clicked -->
      <div id="detail-panel">
        <div id="detail-back">&#8592; Back to listings</div>
        <div id="detail-content"></div>
      </div>

    </div><!-- /#panel -->

  </div><!-- /#main -->

</div><!-- /#app -->


<!-- Leaflet JS: the mapping library. Loaded from CDN. -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // ==============================================================
  // BUILDING DATA
  // ==============================================================
  // Each object represents one commercial property in the downtown
  // district. Fields:
  //   id       — unique identifier (used as object key in leafletMarkers)
  //   name     — street address (displayed as the title)
  //   lat/lng  — GPS coordinates for the map marker
  //   status   — "Vacant" | "Partial" | "Occupied"
  //   sqft     — total building square footage
  //   rent     — asking monthly rent in USD (null if occupied/unknown)
  //   type     — "Retail" | "Office" | "Mixed-use"
  //   contact  — property manager name (null if occupied)
  //   phone    — contact phone number (null if occupied)
  //   email    — contact email (null if occupied)
  //   notes    — free-text description shown in the detail panel
  //
  // NOTE: In a production version, this array would be replaced by
  // a fetch() call to a backend API or a Google Sheets endpoint.
  // ==============================================================

  const buildings = [
    {
      id: 1, name: "112 E Main St",
      lat: 46.0655, lng: -118.3390,
      status: "Vacant", sqft: 2400, rent: 1800, type: "Retail",
      contact: "John Smith Properties", phone: "(509) 555-0101", email: "jsmith@example.com",
      notes: "Corner unit with excellent foot traffic. Updated electrical, 14ft ceilings. Well-suited for a restaurant or boutique retail concept."
    },
    {
      id: 2, name: "124 E Main St",
      lat: 46.0655, lng: -118.3378,
      status: "Occupied", sqft: 1800, rent: null, type: "Retail",
      contact: null, phone: null, email: null,
      notes: "Currently operating as a restaurant."
    },
    {
      id: 3, name: "203 W Main St",
      lat: 46.0655, lng: -118.3415,
      status: "Vacant", sqft: 3200, rent: 2200, type: "Mixed-use",
      contact: "WW Commercial Realty", phone: "(509) 555-0198", email: "info@wwcommercial.com",
      notes: "Ground floor retail with upper floor office space. Exposed brick interior. Rear alley loading access."
    },
    {
      id: 4, name: "118 N Colville St",
      lat: 46.0663, lng: -118.3395,
      status: "Partial", sqft: 5000, rent: 1500, type: "Office",
      contact: "Cascade Properties", phone: "(509) 555-0142", email: "cascade@example.com",
      notes: "2nd floor suite (~1,200 sq ft) available. Ground floor is fully leased. Elevator access and shared restrooms."
    },
    {
      id: 5, name: "215 E Rose St",
      lat: 46.0647, lng: -118.3375,
      status: "Vacant", sqft: 1100, rent: 900, type: "Retail",
      contact: "Main Street Realty", phone: "(509) 555-0177", email: "main@example.com",
      notes: "Cozy, move-in ready storefront with great natural light. Ideal for a cafe, studio, or specialty shop."
    },
    {
      id: 6, name: "301 W Alder St",
      lat: 46.0670, lng: -118.3420,
      status: "Occupied", sqft: 2600, rent: null, type: "Retail",
      contact: null, phone: null, email: null,
      notes: "Currently operating as an art gallery."
    },
    {
      id: 7, name: "140 S 2nd Ave",
      lat: 46.0640, lng: -118.3400,
      status: "Vacant", sqft: 4500, rent: 3200, type: "Mixed-use",
      contact: "Downtown Dev Group", phone: "(509) 555-0165", email: "ddg@example.com",
      notes: "Large open floor plan with a loading dock. Suitable for a brewery, light industrial, or large-format retail. Mixed-use zoning."
    },
    {
      id: 8, name: "88 E Alder St",
      lat: 46.0670, lng: -118.3385,
      status: "Partial", sqft: 3800, rent: 1100, type: "Office",
      contact: "Pacific NW Real Estate", phone: "(509) 555-0133", email: "pnw@example.com",
      notes: "Suite 200 (~900 sq ft) available on the 2nd floor. Remaining suites are leased. Includes fiber internet and a shared kitchenette."
    },
    {
      id: 9, name: "320 W Main St",
      lat: 46.0655, lng: -118.3430,
      status: "Occupied", sqft: 2100, rent: null, type: "Retail",
      contact: null, phone: null, email: null,
      notes: "Boutique clothing store."
    },
    {
      id: 10, name: "175 N 1st Ave",
      lat: 46.0662, lng: -118.3408,
      status: "Vacant", sqft: 1600, rent: 1200, type: "Retail",
      contact: "Valley Properties", phone: "(509) 555-0188", email: "valley@example.com",
      notes: "One block from the farmers market. High weekend foot traffic. Flexible lease terms available on request."
    },
    {
      id: 11, name: "250 E Birch St",
      lat: 46.0645, lng: -118.3370,
      status: "Occupied", sqft: 3000, rent: null, type: "Mixed-use",
      contact: null, phone: null, email: null,
      notes: "Winery tasting room."
    },
    {
      id: 12, name: "66 S Colville St",
      lat: 46.0640, lng: -118.3390,
      status: "Partial", sqft: 6000, rent: 2800, type: "Office",
      contact: "WW Commercial Realty", phone: "(509) 555-0198", email: "info@wwcommercial.com",
      notes: "Upper floors (~2,400 sq ft) available. Ground floor fully leased. Dedicated parking lot. Recently renovated HVAC system."
    },
    {
      id: 13, name: "400 E Main St",
      lat: 46.0655, lng: -118.3360,
      status: "Vacant", sqft: 800, rent: 700, type: "Retail",
      contact: "Eastside Holdings", phone: "(509) 555-0122", email: "east@example.com",
      notes: "Small, well-located space — great for a pop-up, studio, or micro-retail concept. Recently repainted interior."
    },
    {
      id: 14, name: "55 W Rose St",
      lat: 46.0647, lng: -118.3418,
      status: "Vacant", sqft: 2800, rent: 2000, type: "Mixed-use",
      contact: "Cascade Properties", phone: "(509) 555-0142", email: "cascade@example.com",
      notes: "Former restaurant space with grease trap and commercial kitchen infrastructure in place. High potential for a food and beverage concept."
    },
  ];


  // ==============================================================
  // COLOR MAP
  // Maps vacancy status → hex color used for map markers and badges.
  // Keeping this in one place makes it easy to update the palette.
  // ==============================================================
  const COLOR = {
    Vacant:   "#D85A30",  // red-orange
    Partial:  "#EF9F27",  // amber
    Occupied: "#639922",  // green
  };


  // ==============================================================
  // STATE
  // filtered       → subset of buildings currently visible (after filters)
  // leafletMarkers → maps building id → Leaflet marker object
  //                  so we can remove/re-add markers on filter change
  // map            → the Leaflet map instance
  // selectedId     → id of whichever building is currently selected
  // ==============================================================
  let filtered       = [...buildings];
  let leafletMarkers = {};
  let map;
  let selectedId     = null;


  // ==============================================================
  // UTILITY FUNCTIONS
  // ==============================================================

  /** Format a rent number as "$1,800/mo", or "—" if null */
  function formatRent(n) {
    return n ? ("$" + n.toLocaleString() + "/mo") : "—";
  }

  /** Format a square footage number as "2,400 sq ft" */
  function formatSqft(n) {
    return n.toLocaleString() + " sq ft";
  }

  /** Return the CSS class for a status badge based on vacancy status */
  function getBadgeClass(status) {
    if (status === "Vacant")   return "badge-vacant";
    if (status === "Occupied") return "badge-occupied";
    return "badge-partial";
  }


  // ==============================================================
  // MAP MARKER ICON
  // Creates a custom circular Leaflet divIcon.
  // The 'active' flag makes the selected marker bigger and bolder
  // to visually confirm which building is focused.
  // ==============================================================
  function makeIcon(status, active) {
    const color = COLOR[status] || "#888";
    const size  = active ? 18 : 13;
    const border = active ? 3 : 2;

    return L.divIcon({
      html: `<div style="
        width: ${size}px;
        height: ${size}px;
        border-radius: 50%;
        background: ${color};
        border: ${border}px solid white;
        box-shadow: 0 1px 6px rgba(0,0,0,0.35);
        transition: all 0.15s ease;
      "></div>`,
      className:   "",
      iconSize:    [size, size],
      iconAnchor:  [size / 2, size / 2],
      popupAnchor: [0, -10],
    });
  }


  // ==============================================================
  // POPUP HTML
  // The small tooltip that appears directly on the map when a
  // marker is clicked. Kept intentionally brief — full details
  // are shown in the sidebar detail panel.
  // ==============================================================
  function buildPopupHTML(b) {
    const badgeClass = getBadgeClass(b.status);
    return `
      <div class="popup-inner">
        <div class="popup-addr">${b.name}</div>
        <span class="badge ${badgeClass}">${b.status}</span>
        <div class="popup-type">${b.type} &nbsp;·&nbsp; ${formatSqft(b.sqft)}</div>
        ${b.status !== "Occupied"
          ? `<div class="popup-rent">${formatRent(b.rent)}</div>`
          : ""
        }
        <div class="popup-hint">Click to see full details →</div>
      </div>
    `;
  }


  // ==============================================================
  // RENDER SIDEBAR LIST
  // Rebuilds the left-panel listing from the current `filtered`
  // array. Only shows non-occupied spaces (vacant + partial),
  // since occupied spaces aren't relevant to prospective tenants.
  // ==============================================================
  function renderList() {
    const listEl  = document.getElementById("listing");
    const emptyEl = document.getElementById("empty");

    listEl.innerHTML = "";

    // Only show spaces that have at least some availability
    const available = filtered.filter(b => b.status !== "Occupied");

    if (available.length === 0) {
      emptyEl.style.display = "block";
      listEl.style.display  = "none";
    } else {
      emptyEl.style.display = "none";
      listEl.style.display  = "block";
    }

    available.forEach(b => {
      const item = document.createElement("div");
      item.className  = "list-item" + (selectedId === b.id ? " active" : "");
      item.dataset.id = b.id;

      item.innerHTML = `
        <h3>${b.name}</h3>
        <div class="meta">
          <span class="badge ${getBadgeClass(b.status)}">${b.status}</span>
          <span style="font-size:11px; color:#777;">${b.type}</span>
        </div>
        <div class="sub-detail">${formatSqft(b.sqft)} &nbsp;·&nbsp; ${formatRent(b.rent)}</div>
      `;

      // Clicking a list row selects the building (same as clicking the marker)
      item.addEventListener("click", () => selectBuilding(b.id));
      listEl.appendChild(item);
    });

    updateStatPills();
  }


  // ==============================================================
  // UPDATE STAT PILLS
  // Recounts and displays the number of vacant / partial / occupied
  // spaces within the current filtered set.
  // ==============================================================
  function updateStatPills() {
    document.getElementById("cnt-v").textContent =
      filtered.filter(b => b.status === "Vacant").length;
    document.getElementById("cnt-p").textContent =
      filtered.filter(b => b.status === "Partial").length;
    document.getElementById("cnt-o").textContent =
      filtered.filter(b => b.status === "Occupied").length;
  }


  // ==============================================================
  // APPLY FILTERS
  // Called whenever any of the three filter dropdowns changes.
  // Reads all three filter values together, rebuilds `filtered`,
  // removes all existing map markers, and re-adds only the
  // matching ones. Also resets the detail panel.
  // ==============================================================
  function applyFilters() {
    const statusVal = document.getElementById("f-status").value;
    const typeVal   = document.getElementById("f-type").value;
    const rentMax   = parseInt(document.getElementById("f-rent").value) || 0;

    filtered = buildings.filter(b => {
      // Status filter
      if (statusVal !== "all" && b.status !== statusVal) return false;

      // Space type filter
      if (typeVal !== "all" && b.type !== typeVal) return false;

      // Max rent filter — skip occupied spaces entirely when a rent cap is set,
      // and skip spaces whose rent exceeds the cap
      if (rentMax > 0 && b.status === "Occupied") return false;
      if (rentMax > 0 && b.rent && b.rent > rentMax) return false;

      return true;
    });

    // Remove all current markers from the map
    Object.values(leafletMarkers).forEach(m => map.removeLayer(m));
    leafletMarkers = {};

    // Re-add markers for the filtered set only
    filtered.forEach(b => addMarkerToMap(b));

    renderList();
    closeDetailPanel(); // reset detail view since selection may no longer be visible
  }


  // ==============================================================
  // ADD MARKER TO MAP
  // Creates a Leaflet marker for a building, binds a popup, and
  // wires up the click handler. Stored in leafletMarkers[b.id]
  // so we can reference it later (e.g. to change its icon or
  // trigger a popup programmatically).
  // ==============================================================
  function addMarkerToMap(b) {
    const marker = L.marker([b.lat, b.lng], { icon: makeIcon(b.status, false) })
      .bindPopup(buildPopupHTML(b), { maxWidth: 230, minWidth: 200, closeButton: false })
      .addTo(map);

    // Clicking the marker selects the building and opens the detail panel
    marker.on("click", () => selectBuilding(b.id));

    leafletMarkers[b.id] = marker;
  }


  // ==============================================================
  // SELECT BUILDING
  // Central function called when the user clicks either a map
  // marker OR a sidebar list item. It:
  //   1. Updates the selected marker icon (larger + bolder)
  //   2. Flies the map view smoothly to that building
  //   3. Opens the map popup
  //   4. Opens the sidebar detail panel
  //   5. Highlights the active list row
  // ==============================================================
  function selectBuilding(id) {
    selectedId = id;
    const building = buildings.find(b => b.id === id);
    if (!building) return;

    // Update all marker icons: enlarge the selected one, reset others
    Object.entries(leafletMarkers).forEach(([bid, marker]) => {
      const b = buildings.find(b => b.id === parseInt(bid));
      marker.setIcon(makeIcon(b.status, parseInt(bid) === id));
    });

    // Smoothly animate the map to center on the selected building
    map.flyTo([building.lat, building.lng], 17, { duration: 0.8 });

    // Open the Leaflet popup on that marker
    if (leafletMarkers[id]) {
      leafletMarkers[id].openPopup();
    }

    // Show the detail panel in the sidebar
    openDetailPanel(building);

    // Highlight the corresponding list item
    document.querySelectorAll(".list-item").forEach(el => {
      el.classList.toggle("active", parseInt(el.dataset.id) === id);
    });
  }


  // ==============================================================
  // OPEN DETAIL PANEL
  // Populates and shows the building detail view in the sidebar,
  // hiding the list. Contact info is only shown for non-occupied
  // spaces — occupied buildings just show basic info and notes.
  // ==============================================================
  function openDetailPanel(b) {
    document.getElementById("detail-panel").classList.add("open");
    document.getElementById("listing").classList.add("hidden");
    document.getElementById("panel-header").textContent = "Space details";

    const hasContact = b.contact && b.status !== "Occupied";

    document.getElementById("detail-content").innerHTML = `
      <div style="margin-bottom: 10px;">
        <span class="badge ${getBadgeClass(b.status)}" style="font-size:12px; padding:3px 10px;">
          ${b.status}
        </span>
      </div>

      <div class="detail-address">${b.name}</div>

      <!-- Space specs -->
      <div class="detail-section">
        <h4>Space info</h4>
        <div class="detail-row"><span>Type</span><span>${b.type}</span></div>
        <div class="detail-row"><span>Total size</span><span>${formatSqft(b.sqft)}</span></div>
        ${b.status !== "Occupied"
          ? `<div class="detail-row"><span>Asking rent</span><span>${formatRent(b.rent)}</span></div>`
          : ""
        }
      </div>

      <!-- Contact info (only for available spaces) -->
      ${hasContact ? `
      <div class="detail-section">
        <h4>Contact</h4>
        <div class="detail-row"><span>Property mgr</span><span>${b.contact}</span></div>
        <div class="detail-row"><span>Phone</span><span>${b.phone}</span></div>
        <div class="detail-row"><span>Email</span><span style="font-size:11px;">${b.email}</span></div>
      </div>
      ` : ""}

      <!-- Notes / description -->
      <div class="detail-section">
        <h4>Description</h4>
        <div class="notes-box">${b.notes}</div>
      </div>
    `;
  }


  // ==============================================================
  // CLOSE DETAIL PANEL
  // Resets the sidebar back to the default list view, clears the
  // selected building, and resets all marker icons to their
  // default (smaller) size.
  // ==============================================================
  function closeDetailPanel() {
    document.getElementById("detail-panel").classList.remove("open");
    document.getElementById("listing").classList.remove("hidden");
    document.getElementById("panel-header").textContent = "Available spaces";

    selectedId = null;

    // Reset all marker icons back to default size
    Object.entries(leafletMarkers).forEach(([bid, marker]) => {
      const b = buildings.find(b => b.id === parseInt(bid));
      marker.setIcon(makeIcon(b.status, false));
    });
  }


  // ==============================================================
  // EVENT LISTENERS
  // ==============================================================

  // Back button in detail panel → return to listing view
  document.getElementById("detail-back").addEventListener("click", closeDetailPanel);

  // Any filter dropdown change → re-run all filters
  ["f-status", "f-type", "f-rent"].forEach(id => {
    document.getElementById(id).addEventListener("change", applyFilters);
  });


  // ==============================================================
  // MAP INITIALIZATION
  // Runs after the page fully loads (to ensure the #map div exists
  // and has a rendered size — Leaflet needs this).
  //
  // Steps:
  //   1. Create the Leaflet map centered on downtown Walla Walla
  //   2. Add OpenStreetMap tile layer (free, no API key needed)
  //   3. Place all building markers
  //   4. Render the initial sidebar list
  // ==============================================================
  window.addEventListener("load", function () {

    // Initialize map centered on downtown Walla Walla, WA
    // Zoom level 16 shows roughly a 4–5 block radius
    map = L.map("map", { zoomControl: true }).setView([46.0655, -118.3400], 16);

    // OpenStreetMap tile layer — free and open source
    // Attribution is required by the OSM tile usage policy
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(map);

    // Place a marker for every building in the dataset
    buildings.forEach(b => addMarkerToMap(b));

    // Render the initial listing in the sidebar
    renderList();
  });

</script>
</body>
</html>
